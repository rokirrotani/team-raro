<div class="app-shell">
  <header class="app-header" [class.app-header--scrolled]="hasScrolled()">
    <div class="app-header__inner">
      <a class="brand" routerLink="/">
        <span class="brand__mark">TR</span>
        <span class="brand__text">{{ studioName() }}</span>
      </a>

      <nav class="app-nav" aria-label="Navigazione principale">
        <a routerLink="/" routerLinkActive="app-nav__link--active" [routerLinkActiveOptions]="{ exact: true }" class="app-nav__link">Home</a>
        <a routerLink="/servizi" routerLinkActive="app-nav__link--active" class="app-nav__link">Servizi</a>
        <a routerLink="/preventivo" routerLinkActive="app-nav__link--active" class="app-nav__link">Preventivo</a>
        <a routerLink="/contatti" routerLinkActive="app-nav__link--active" class="app-nav__link">Contatti</a>
      </nav>
    </div>
  </header>

  <router-outlet></router-outlet>
</div>
